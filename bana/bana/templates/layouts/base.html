{% load static tailwind_tags %}

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Le service de mobilité partagée pour les enfants conçu pour les trajets maison-école-activités. Gain de temps. Retrouvez de la flexibilité dans votre agenda ...">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link href="{% static 'bana/img/icon/favicon.ico' %}" rel="icon">
    {% tailwind_css %}
    <link rel="stylesheet" href="{% static 'bana/css/animate.css' %}">
    <link rel="stylesheet" href="{% static 'bana/css/footer.css' %}">
    <script src="https://js.stripe.com/basil/stripe.js"></script>
</head>

<body class="min-h-screen flex flex-col bg-gray-50">
    {% include 'layouts/header.html' %}

    <main class="flex-grow ">
        {% block content %}
        {% endblock %}
    </main>

    {% include 'layouts/footer.html' %}

    <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.js" integrity="sha384-BBDmZzVt6vjz5YbQqZPtFZW82o8QotoM7RUp5xOxV3nSJ8u2pSdtzFAbGKzTlKtg" crossorigin="anonymous"></script>
    <script src="{% static 'bana/js/carroussel.js' %}"></script>
    <script src="{% static 'bana/js/top-mobile-menu.js' %}"></script>
    <script src="{% static 'bana/js/video.js' %}"></script>
    <script src="{% static 'bana/js/toast.js' %}"></script>
    <script src="{% static 'bana/js/animate.js' %}"></script>
</body>

</html>
