{% load i18n %}
{% with url_name=request.resolver_match.url_name %}

<!-- Mobile : pills scrollables -->
<div class="flex gap-2 overflow-x-auto pb-1 mb-8 md:hidden" style="scrollbar-width:none;-webkit-overflow-scrolling:touch">

  <a href="{% url 'simple_proposed_traject' %}"
     class="flex items-center gap-1.5 px-3 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-colors shrink-0
            {% if url_name == 'simple_proposed_traject' %}bg-brand text-white{% else %}bg-gray-100 text-gray-600 hover:bg-brand/10 hover:text-brand{% endif %}">
    <svg class="w-4 h-4 shrink-0" viewBox="0 0 25 25" fill="currentColor"><polygon points="25 10 15 10 15 0 10 0 10 10 0 10 0 15 10 15 10 25 15 25 15 15 25 15 25 10"/></svg>
    {% trans "Nouveau trajet" %}
  </a>

  <a href="{% url 'my_simple_trajects' %}"
     class="flex items-center gap-1.5 px-3 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-colors shrink-0
            {% if url_name == 'my_simple_trajects' or url_name == 'my_simple_groupe_detail' %}bg-brand text-white{% else %}bg-gray-100 text-gray-600 hover:bg-brand/10 hover:text-brand{% endif %}">
    <svg class="w-4 h-4 shrink-0" viewBox="0 0 25 25" fill="currentColor"><path d="M12.5,0C7.44,0,3.33,3.93,3.33,8.75c0,6.56,9.17,16.25,9.17,16.25,0,0,9.17-9.69,9.17-16.25C21.67,3.93,17.56,0,12.5,0ZM10.46,12.5h-1.88v-1.8l4.39-4.18,1.87,1.79-4.38,4.19ZM16.28,6.94l-.92.87-1.89-1.8.92-.87c.2-.19.51-.19.71,0l1.18,1.12c.2.19.2.49,0,.67h0Z"/></svg>
    {% trans "Mes trajets" %}
  </a>

  <a href="{% url 'my_matchings_simple' %}"
     class="flex items-center gap-1.5 px-3 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-colors shrink-0
            {% if url_name == 'my_matchings_simple' or url_name == 'my_matchings_simple_detail' %}bg-brand text-white{% else %}bg-gray-100 text-gray-600 hover:bg-brand/10 hover:text-brand{% endif %}">
    <svg class="w-4 h-4 shrink-0" viewBox="0 0 25 25" fill="currentColor"><path d="M19.17,5H5.83c-.92,0-1.67.75-1.67,1.67v11.67c0,.92.75,1.67,1.67,1.67h13.33c.92,0,1.67-.75,1.67-1.67V6.67c0-.92-.75-1.67-1.67-1.67ZM10.83,16.67h-4.17v-1.67h4.17v1.67ZM10.83,13.33h-4.17v-1.67h4.17v1.67ZM10.83,10h-4.17v-1.67h4.17v1.67ZM14.85,15l-2.35-2.37,1.17-1.17,1.17,1.18,2.64-2.64,1.18,1.18-3.83,3.82Z"/></svg>
    {% trans "Mes matchings" %}
  </a>

</div>

<!-- Desktop : segmented control -->
<div class="hidden md:flex mb-10">
  <div class="inline-flex items-center bg-gray-100 rounded-xl p-1 gap-1">

    <a href="{% url 'simple_proposed_traject' %}"
       class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all
              {% if url_name == 'simple_proposed_traject' %}bg-white shadow-sm text-brand{% else %}text-gray-500 hover:text-gray-700{% endif %}">
      <svg class="w-4 h-4 shrink-0" viewBox="0 0 25 25" fill="currentColor"><polygon points="25 10 15 10 15 0 10 0 10 10 0 10 0 15 10 15 10 25 15 25 15 15 25 15 25 10"/></svg>
      {% trans "Nouveau trajet" %}
    </a>

    <a href="{% url 'my_simple_trajects' %}"
       class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all
              {% if url_name == 'my_simple_trajects' or url_name == 'my_simple_groupe_detail' %}bg-white shadow-sm text-brand{% else %}text-gray-500 hover:text-gray-700{% endif %}">
      <svg class="w-4 h-4 shrink-0" viewBox="0 0 25 25" fill="currentColor"><path d="M12.5,0C7.44,0,3.33,3.93,3.33,8.75c0,6.56,9.17,16.25,9.17,16.25,0,0,9.17-9.69,9.17-16.25C21.67,3.93,17.56,0,12.5,0ZM10.46,12.5h-1.88v-1.8l4.39-4.18,1.87,1.79-4.38,4.19ZM16.28,6.94l-.92.87-1.89-1.8.92-.87c.2-.19.51-.19.71,0l1.18,1.12c.2.19.2.49,0,.67h0Z"/></svg>
      {% trans "Mes trajets" %}
    </a>

    <a href="{% url 'my_matchings_simple' %}"
       class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all
              {% if url_name == 'my_matchings_simple' or url_name == 'my_matchings_simple_detail' %}bg-white shadow-sm text-brand{% else %}text-gray-500 hover:text-gray-700{% endif %}">
      <svg class="w-4 h-4 shrink-0" viewBox="0 0 25 25" fill="currentColor"><path d="M19.17,5H5.83c-.92,0-1.67.75-1.67,1.67v11.67c0,.92.75,1.67,1.67,1.67h13.33c.92,0,1.67-.75,1.67-1.67V6.67c0-.92-.75-1.67-1.67-1.67ZM10.83,16.67h-4.17v-1.67h4.17v1.67ZM10.83,13.33h-4.17v-1.67h4.17v1.67ZM10.83,10h-4.17v-1.67h4.17v1.67ZM14.85,15l-2.35-2.37,1.17-1.17,1.17,1.18,2.64-2.64,1.18,1.18-3.83,3.82Z"/></svg>
      {% trans "Mes matchings" %}
    </a>

  </div>
</div>

{% endwith %}
