{% extends "allauth/layouts/base.html" %}
{% load static i18n %}
{% block head_title %}{% trans "Ajouter un enfant" %}{% endblock %}

{% block content %}

<div class="max-w-4xl mx-auto px-4 py-8">
  <div class="bg-white shadow-lg rounded-xl px-4 py-8 sm:p-8 md:p-12 space-y-8">

    <h2 class="text-2xl font-bold text-brand">
      {% trans "Ajouter une adresse favorite" %}
    </h2>

    <form method="POST" class="space-y-6">
      {% csrf_token %}

      <!-- Nom de l'adresse -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          {% trans "Nom de l'adresse" %}
        </label>
        {{ form.label }}
      </div>

      <!-- Adresse -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          {% trans "Adresse" %}
        </label>

        {{ form.address }}
        <!-- Suggestions Google -->
        <ul id="fav-suggestion-list"
            class="bg-white border border-gray-300 rounded-md shadow-md mt-1 max-h-48 overflow-auto">
        </ul>
      </div>

      <!-- Boutons -->
      <div class="flex items-center gap-3 pt-4">

        <a href="{% url 'accounts:profile_addresses' %}"
           class="px-6 py-3 bg-gray-200 text-gray-800 font-semibold rounded-full hover:bg-gray-300 transition">
          {% trans "Retour" %}
        </a>

        <button type="submit"
                class="px-6 py-3 bg-brand text-white font-semibold rounded-full hover:bg-brand-dark transition">
          {% trans "Enregistrer" %}
        </button>

      </div>

    </form>

  </div>
</div>

<script>
const setupAutocomplete = (inputId, suggestionListId) => {
    const inputField = document.getElementById(inputId);
    const suggestionList = document.getElementById(suggestionListId);

    console.log("inputField =", inputField);
    console.log("suggestionList =", suggestionList);

    if (!inputField || !suggestionList) {
        console.error("Autocomplete: input ou liste introuvable");
        return;
    }

    inputField.addEventListener("input", async () => {
        const query = inputField.value.trim();

        console.log("Query =", query);

        if (query.length < 3) {
            suggestionList.innerHTML = "";
            return;
        }

        try {
            const url = `{% url 'autocomplete' %}?query=${encodeURIComponent(query)}`;
            console.log("Fetch URL =", url);

            const response = await fetch(url);
            const data = await response.json();

            console.log("Autocomplete data =", data);

            suggestionList.innerHTML = "";

            (data.suggestions || []).forEach(s => {
                const li = document.createElement("li");
                li.textContent = s.description;
                li.classList.add("cursor-pointer", "p-2", "hover:bg-gray-100", "border-b");

                li.addEventListener("click", () => {
                    inputField.value = s.description;
                    suggestionList.innerHTML = "";
                });

                suggestionList.appendChild(li);
            });
        } catch (err) {
            console.error("Erreur autocomplete :", err);
        }
    });
};

document.addEventListener("DOMContentLoaded", () => {
    setupAutocomplete("id_address", "fav-suggestion-list");
});
</script>

{% endblock %}
